services:
  rag-chatbot:
    build: .
    container_name: rag-chatbot
    ports:
      - "8501:8501"
    environment:
      # Pass API keys as env vars (optional — app also accepts them via the UI)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
    volumes:
      # Persist HuggingFace model cache across container restarts
      - mistral-cache:/root/.cache/mistralai
    restart: unless-stopped

volumes:
  mistral-cache:
